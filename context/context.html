<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Subtext Context</title>
        <style>
            :root {
                color-scheme: light;
                --bg: #f7f4ec;
                --surface: rgba(255, 252, 245, 0.92);
                --surface-strong: #fffdf8;
                --text: #1d2a33;
                --muted: #5c6a73;
                --border: rgba(29, 42, 51, 0.12);
                --accent: #0f766e;
                --accent-strong: #115e59;
                --shadow: 0 18px 44px rgba(24, 39, 49, 0.12);
            }

            * { box-sizing: border-box; }

            body {
                margin: 0;
                font-family: Georgia, "Times New Roman", serif;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 28%),
                    radial-gradient(circle at top right, rgba(180, 83, 9, 0.10), transparent 22%),
                    linear-gradient(180deg, #fbf8f1 0%, var(--bg) 100%);
            }

            main {
                max-width: 960px;
                margin: 0 auto;
                padding: 48px 20px 64px;
            }

            .hero {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 24px;
                padding: 28px;
                box-shadow: var(--shadow);
                backdrop-filter: blur(10px);
            }

            .eyebrow {
                margin: 0 0 10px;
                font: 600 0.78rem/1.2 Arial, Helvetica, sans-serif;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--accent-strong);
            }

            h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 5vw, 3.5rem);
                line-height: 0.98;
            }

            .summary {
                margin: 0;
                max-width: 65ch;
                color: var(--muted);
                font: 400 1rem/1.6 Arial, Helvetica, sans-serif;
            }

            .meta {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 18px;
            }

            .pill {
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 8px 12px;
                background: rgba(255, 255, 255, 0.7);
                font: 500 0.92rem/1.2 Arial, Helvetica, sans-serif;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 16px;
                margin-top: 28px;
            }

            .card {
                display: flex;
                flex-direction: column;
                gap: 12px;
                min-height: 180px;
                padding: 20px;
                border-radius: 20px;
                border: 1px solid var(--border);
                background: var(--surface-strong);
                box-shadow: 0 10px 24px rgba(24, 39, 49, 0.08);
            }

            .card h2 {
                margin: 0;
                font-size: 1.15rem;
                line-height: 1.2;
            }

            .card p {
                margin: 0;
                color: var(--muted);
                font: 400 0.95rem/1.5 Arial, Helvetica, sans-serif;
            }

            .actions {
                margin-top: auto;
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            .button {
                appearance: none;
                border: 0;
                border-radius: 999px;
                padding: 10px 14px;
                text-decoration: none;
                background: var(--accent);
                color: #f8fbfa;
                font: 600 0.92rem/1.2 Arial, Helvetica, sans-serif;
            }

            .button.secondary {
                background: rgba(15, 118, 110, 0.12);
                color: var(--accent-strong);
            }

            .empty {
                margin-top: 24px;
                padding: 18px 20px;
                border-radius: 18px;
                border: 1px dashed var(--border);
                background: rgba(255, 255, 255, 0.45);
                color: var(--muted);
                font: 400 0.98rem/1.5 Arial, Helvetica, sans-serif;
            }

            @media (max-width: 640px) {
                main {
                    padding: 24px 14px 40px;
                }

                .hero {
                    padding: 20px;
                    border-radius: 20px;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <section class="hero">
                <p class="eyebrow">Subtext Context</p>
                <h1 id="page-title">More context for this article</h1>
                <p id="page-summary" class="summary"></p>
                <div class="meta">
                    <span id="article-url-pill" class="pill"></span>
                    <span id="article-source-pill" class="pill"></span>
                </div>
            </section>
            <section id="resource-grid" class="grid"></section>
            <section id="empty-state" class="empty" hidden>
                Open this page from a Subtext analysis result to generate related context links.
            </section>
        </main>
        <script type="module" src="context.js"></script>
    </body>
</html>
